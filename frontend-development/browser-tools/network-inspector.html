<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Inspector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: #252525;
      padding: 1rem 1.5rem;
      border-bottom: 2px solid #333;
    }
    
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: #999;
      font-size: 0.875rem;
    }
    
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .sidebar {
      width: 300px;
      background: #252525;
      border-right: 2px solid #333;
      overflow-y: auto;
    }
    
    .sidebar-section {
      padding: 1.5rem;
      border-bottom: 1px solid #333;
    }
    
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }
    
    .endpoint-btn {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    
    .endpoint-btn:hover {
      background: #3a3a3a;
      border-color: #0066ff;
    }
    
    .endpoint-method {
      display: inline-block;
      padding: 0.125rem 0.375rem;
      background: #0066ff;
      color: #fff;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 0.5rem;
    }
    
    .endpoint-method.post { background: #34c759; }
    .endpoint-method.put { background: #ff9500; }
    .endpoint-method.delete { background: #ff3b30; }
    
    .endpoint-path {
      font-size: 0.875rem;
    }
    
    .inspector {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .request-builder {
      background: #252525;
      border-bottom: 2px solid #333;
      padding: 1.5rem;
    }
    
    .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    .form-row.method {
      align-items: center;
    }
    
    label {
      min-width: 80px;
      color: #999;
      font-size: 0.875rem;
    }
    
    select, input, textarea {
      flex: 1;
      padding: 0.5rem;
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    button {
      padding: 0.5rem 1.5rem;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #0052cc;
    }
    
    button:disabled {
      background: #333;
      cursor: not-allowed;
    }
    
    .response-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    
    .response-section {
      margin-bottom: 2rem;
    }
    
    .response-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-badge.success {
      background: #34c75933;
      color: #34c759;
    }
    
    .status-badge.error {
      background: #ff3b3033;
      color: #ff3b30;
    }
    
    .timing-info {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.5rem;
      background: #333;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #999;
    }
    
    .code-block {
      background: #1e1e1e;
      padding: 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      overflow-x: auto;
    }
    
    pre {
      margin: 0;
      font-size: 0.875rem;
      line-height: 1.5;
      color: #d4d4d4;
    }
    
    .header-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .header-table th {
      text-align: left;
      padding: 0.5rem;
      background: #1e1e1e;
      color: #999;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
    }
    
    .header-table td {
      padding: 0.5rem;
      border-bottom: 1px solid #333;
      font-size: 0.875rem;
    }
    
    .header-table td:first-child {
      color: #4ec9b0;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #666;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .json-key { color: #4ec9b0; }
    .json-string { color: #ce9178; }
    .json-number { color: #b5cea8; }
    .json-boolean { color: #569cd6; }
    .json-null { color: #569cd6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 Network Inspector</h1>
    <div class="subtitle">Test HTTP requests and inspect responses</div>
  </div>
  
  <div class="main-container">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="section-title">Provider Search Endpoints</div>
        <div id="endpointsList"></div>
      </div>
      
      <div class="sidebar-section">
        <div class="section-title">Common APIs</div>
        <div id="commonEndpoints"></div>
      </div>
    </div>
    
    <div class="inspector">
      <div class="request-builder">
        <div class="form-row method">
          <label>Method</label>
          <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
          </select>
          <button id="sendBtn" style="margin-left: auto;">Send Request</button>
        </div>
        
        <div class="form-row">
          <label>URL</label>
          <input type="text" id="url" placeholder="https://api.example.com/endpoint">
        </div>
        
        <div class="form-row">
          <label>Headers</label>
          <textarea id="headers" placeholder='{"Authorization": "Bearer token", "Content-Type": "application/json"}'></textarea>
        </div>
        
        <div class="form-row">
          <label>Body</label>
          <textarea id="body" placeholder='{"key": "value"}'></textarea>
        </div>
      </div>
      
      <div class="response-container" id="responseContainer">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4m0 4h.01"/>
          </svg>
          <div>Configure a request above and click "Send Request"</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Endpoint configurations
    const providerSearchEndpoints = [
      {
        name: 'Search Providers',
        method: 'POST',
        url: 'http://localhost:8000/api/search',
        headers: {
          'Content-Type': 'application/json'
        },
        body: {
          specialty: 'cardiology',
          location: 'San Francisco, CA',
          radius: 25
        }
      },
      {
        name: 'Get Provider Details',
        method: 'GET',
        url: 'http://localhost:8000/api/providers/PROVIDER_ID',
        headers: {
          'Authorization': 'Bearer YOUR_TOKEN'
        }
      },
      {
        name: 'Create List',
        method: 'POST',
        url: 'http://localhost:8000/api/lists',
        headers: {
          'Authorization': 'Bearer YOUR_TOKEN',
          'Content-Type': 'application/json'
        },
        body: {
          name: 'My Provider List',
          description: 'List description'
        }
      },
      {
        name: 'Add to List',
        method: 'POST',
        url: 'http://localhost:8000/api/lists/LIST_ID/providers',
        headers: {
          'Authorization': 'Bearer YOUR_TOKEN',
          'Content-Type': 'application/json'
        },
        body: {
          provider_id: 'PROVIDER_ID'
        }
      },
      {
        name: 'Login',
        method: 'POST',
        url: 'http://localhost:8000/api/auth/login',
        headers: {
          'Content-Type': 'application/json'
        },
        body: {
          email: 'user@example.com',
          password: 'password123'
        }
      }
    ]
    
    const commonEndpoints = [
      {
        name: 'JSONPlaceholder - Get Posts',
        method: 'GET',
        url: 'https://jsonplaceholder.typicode.com/posts'
      },
      {
        name: 'JSONPlaceholder - Create Post',
        method: 'POST',
        url: 'https://jsonplaceholder.typicode.com/posts',
        headers: {
          'Content-Type': 'application/json'
        },
        body: {
          title: 'My Post',
          body: 'Post content',
          userId: 1
        }
      },
      {
        name: 'ReqRes - Get Users',
        method: 'GET',
        url: 'https://reqres.in/api/users?page=1'
      },
      {
        name: 'HTTPBin - Echo Request',
        method: 'POST',
        url: 'https://httpbin.org/post',
        headers: {
          'Content-Type': 'application/json'
        },
        body: {
          message: 'Hello from Network Inspector!'
        }
      }
    ]
    
    // Elements
    const methodSelect = document.getElementById('method')
    const urlInput = document.getElementById('url')
    const headersInput = document.getElementById('headers')
    const bodyInput = document.getElementById('body')
    const sendBtn = document.getElementById('sendBtn')
    const responseContainer = document.getElementById('responseContainer')
    const endpointsList = document.getElementById('endpointsList')
    const commonEndpointsList = document.getElementById('commonEndpoints')
    
    // Initialize
    function init() {
      // Populate endpoints
      populateEndpoints(providerSearchEndpoints, endpointsList)
      populateEndpoints(commonEndpoints, commonEndpointsList)
      
      // Send button
      sendBtn.addEventListener('click', sendRequest)
      
      // Enter to send
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          sendRequest()
        }
      })
    }
    
    function populateEndpoints(endpoints, container) {
      endpoints.forEach(endpoint => {
        const btn = document.createElement('button')
        btn.className = 'endpoint-btn'
        btn.innerHTML = `
          <span class="endpoint-method ${endpoint.method.toLowerCase()}">${endpoint.method}</span>
          <span class="endpoint-path">${endpoint.name}</span>
        `
        btn.addEventListener('click', () => loadEndpoint(endpoint))
        container.appendChild(btn)
      })
    }
    
    function loadEndpoint(endpoint) {
      methodSelect.value = endpoint.method
      urlInput.value = endpoint.url
      
      if (endpoint.headers) {
        headersInput.value = JSON.stringify(endpoint.headers, null, 2)
      } else {
        headersInput.value = ''
      }
      
      if (endpoint.body) {
        bodyInput.value = JSON.stringify(endpoint.body, null, 2)
      } else {
        bodyInput.value = ''
      }
    }
    
    async function sendRequest() {
      const method = methodSelect.value
      const url = urlInput.value.trim()
      
      if (!url) {
        alert('Please enter a URL')
        return
      }
      
      // Parse headers
      let headers = {}
      if (headersInput.value.trim()) {
        try {
          headers = JSON.parse(headersInput.value)
        } catch (e) {
          alert('Invalid JSON in headers')
          return
        }
      }
      
      // Parse body
      let body = null
      if (bodyInput.value.trim() && method !== 'GET') {
        try {
          body = JSON.parse(bodyInput.value)
        } catch (e) {
          alert('Invalid JSON in body')
          return
        }
      }
      
      // Show loading
      responseContainer.innerHTML = '<div class="empty-state">Sending request...</div>'
      sendBtn.disabled = true
      
      const startTime = performance.now()
      
      try {
        const options = {
          method,
          headers
        }
        
        if (body) {
          options.body = JSON.stringify(body)
        }
        
        const response = await fetch(url, options)
        const endTime = performance.now()
        const duration = Math.round(endTime - startTime)
        
        // Get response headers
        const responseHeaders = {}
        response.headers.forEach((value, key) => {
          responseHeaders[key] = value
        })
        
        // Get response body
        let responseBody
        const contentType = response.headers.get('content-type')
        if (contentType && contentType.includes('application/json')) {
          responseBody = await response.json()
        } else {
          responseBody = await response.text()
        }
        
        // Display response
        displayResponse({
          status: response.status,
          statusText: response.statusText,
          headers: responseHeaders,
          body: responseBody,
          duration
        })
        
      } catch (error) {
        const endTime = performance.now()
        const duration = Math.round(endTime - startTime)
        
        displayError(error, duration)
      } finally {
        sendBtn.disabled = false
      }
    }
    
    function displayResponse(response) {
      const isSuccess = response.status >= 200 && response.status < 300
      const statusClass = isSuccess ? 'success' : 'error'
      
      responseContainer.innerHTML = `
        <div class="response-section">
          <div class="response-title">
            Response
            <span class="status-badge ${statusClass}">${response.status} ${response.statusText}</span>
            <span class="timing-info">⏱ ${response.duration}ms</span>
          </div>
        </div>
        
        <div class="response-section">
          <div class="response-title">Headers</div>
          <table class="header-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody>
              ${Object.entries(response.headers).map(([key, value]) => `
                <tr>
                  <td>${key}</td>
                  <td>${value}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        
        <div class="response-section">
          <div class="response-title">Body</div>
          <div class="code-block">
            <pre>${formatResponseBody(response.body)}</pre>
          </div>
        </div>
      `
    }
    
    function displayError(error, duration) {
      responseContainer.innerHTML = `
        <div class="response-section">
          <div class="response-title">
            Error
            <span class="status-badge error">Request Failed</span>
            <span class="timing-info">⏱ ${duration}ms</span>
          </div>
          <div class="code-block">
            <pre style="color: #ff3b30;">${error.message}

${error.stack || ''}

Common causes:
- CORS policy blocking the request
- Network error (server down, no internet)
- Invalid URL
- Server not responding

Tip: Use browser DevTools Network tab for detailed CORS errors.</pre>
          </div>
        </div>
      `
    }
    
    function formatResponseBody(body) {
      if (typeof body === 'string') {
        try {
          const parsed = JSON.parse(body)
          return syntaxHighlightJSON(parsed)
        } catch {
          return escapeHtml(body)
        }
      }
      
      if (typeof body === 'object') {
        return syntaxHighlightJSON(body)
      }
      
      return String(body)
    }
    
    function syntaxHighlightJSON(obj) {
      let json = JSON.stringify(obj, null, 2)
      
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      
      json = json.replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      json = json.replace(/: "([^"]+)"/g, ': <span class="json-string">"$1"</span>')
      json = json.replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
      json = json.replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>')
      json = json.replace(/: null/g, ': <span class="json-null">null</span>')
      
      return json
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }
    
    // Initialize app
    init()
  </script>
</body>
</html>
